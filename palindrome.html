<!DOCTYPE html>
<html>
<head>
    <title>Palindrome Checker</title>
</head>

<body>

<h1>Palindrome Checker</h1>

<label>Enter a word or number:</label>
<input type="text" id="inputText">

<br><br>

<button onclick="checkPalindrome()">Check</button>

<h2 id="result"></h2>


<script>

    // Global Scope variable
    let count = 0;


    // Function Declaration
    function cleanText(text) {
        return text.toLowerCase().replace(/[^a-z0-9]/g, "");
    }


    // Function Expression
    const reverseText = function(text) {
        return text.split("").reverse().join("");
    };


    // Closure Function
    function palindromeCounter() {

        let attempts = 0;  // Local scope variable

        return function() {
            attempts++;
            return attempts;
        };
    }


    const counter = palindromeCounter();


    // Arrow Function
    const isPalindrome = (text) => {

        let reversed = reverseText(text);

        return text === reversed;
    };


    // Main Function
    function checkPalindrome() {

        try {

            let userInput = document.getElementById("inputText").value;


            // Validation
            if(userInput.trim() === "") {
                throw "Input cannot be empty";
            }


            let formattedText = cleanText(userInput);


            let result = isPalindrome(formattedText);


            count++;
            let attemptNumber = counter();


            if(result) {

                document.getElementById("result").innerHTML =
                `
                ${userInput} is a Palindrome ✅ <br>
                Attempts: ${attemptNumber}
                `;

            }

            else {

                document.getElementById("result").innerHTML =
                `
                ${userInput} is not a Palindrome ❌ <br>
                Attempts: ${attemptNumber}
                `;

            }


            console.log("Palindrome check completed");

        }


        catch(error) {

            document.getElementById("result").innerHTML =
            "Error: " + error;

            console.error(error);

        }

    }

</script>

</body>
</html>
